services:
  postgres:
    image: postgres:16
    container_name: brandos-postgres
    environment:
      POSTGRES_USER: brandos
      POSTGRES_PASSWORD: brandos
      POSTGRES_DB: brandos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: brandos-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
